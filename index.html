<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Backwards Video</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: #7c3aed;
      top: -100px; left: -100px;
      animation: blob1 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: #db2777;
      bottom: -100px; right: -100px;
      animation: blob2 10s ease-in-out infinite alternate;
    }
    @keyframes blob1 { to { transform: translate(80px, 60px) scale(1.2); } }
    @keyframes blob2 { to { transform: translate(-60px, -80px) scale(1.1); } }

    .everything { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 32px; width: 100%; max-width: 820px; }

    /* Header */
    .header { text-align: center; }
    .logo {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #c084fc, #f472b6, #fb923c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .tagline {
      margin-top: 8px;
      color: #6b7280;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* Upload card */
    .upload-card {
      width: 100%;
      background: linear-gradient(145deg, #12121c, #1a1a2e);
      border: 1.5px solid #2a2a3e;
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .upload-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(124,58,237,0.08), transparent 70%);
      pointer-events: none;
    }
    .upload-card:hover, .upload-card.drag-over {
      border-color: #7c3aed;
      transform: translateY(-2px);
      box-shadow: 0 20px 60px rgba(124,58,237,0.2);
    }
    .upload-icon-big {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .upload-card h2 { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
    .upload-card p { color: #4b5563; font-size: 0.9rem; }

    .choose-btn {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
      font-family: 'Inter', sans-serif;
    }
    .choose-btn:hover { transform: scale(1.04); box-shadow: 0 8px 32px rgba(124,58,237,0.5); }
    .choose-btn:active { transform: scale(0.97); }

    /* Player */
    .player-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .video-wrap {
      width: 100%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 0 1px #2a2a3e, 0 30px 80px rgba(0,0,0,0.6);
      position: relative;
    }
    canvas { display: block; width: 100%; height: auto; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .badge {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status { font-size: 0.85rem; color: #6b7280; flex: 1; }

    /* Progress */
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: #1e1e2e;
      border-radius: 99px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #db2777, #fb923c);
      border-radius: 99px;
      width: 0%;
      transition: width 0.05s linear;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -5px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(124,58,237,0.8);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .ctrl-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .ctrl-btn:not(:disabled):hover { transform: translateY(-1px); }
    .ctrl-btn:not(:disabled):active { transform: scale(0.96); }

    .ctrl-primary {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
      padding: 13px 32px;
      font-size: 1rem;
    }
    .ctrl-secondary {
      background: #1a1a2e;
      color: #a78bfa;
      border: 1.5px solid #2a2a3e;
    }
    .ctrl-secondary:not(:disabled):hover { border-color: #7c3aed; background: #1e1a3e; }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a2e;
      border: 1.5px solid #2a2a3e;
      border-radius: 50px;
      padding: 8px 18px;
      color: #a78bfa;
      font-size: 0.85rem;
      font-weight: 600;
    }
    input[type="range"] {
      accent-color: #7c3aed;
      width: 90px;
      cursor: pointer;
    }

    #file-input { display: none; }
  </style>
</head>
<body>
<div class="everything">

  <div class="header">
    <div class="logo">&#9194; REWIND</div>
    <p class="tagline">Drop any video — watch it play backwards</p>
  </div>

  <div class="upload-card" id="upload-zone">
    <span class="upload-icon-big">&#127916;</span>
    <h2>Drop your video here</h2>
    <p>MP4 &bull; MOV &bull; WebM &bull; and more</p>
    <input type="file" id="file-input" accept="video/*" />
    <br/>
    <button class="choose-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
      &#128269; Choose Video
    </button>
  </div>

  <div class="player-section" id="player-section">
    <div class="status-bar">
      <span class="badge">&#9194; Reversed</span>
      <span class="status" id="status">Processing…</span>
    </div>

    <div class="video-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn ctrl-primary" id="play-btn" disabled>&#9654;&#65039; Play</button>
      <button class="ctrl-btn ctrl-secondary" id="restart-btn" disabled>&#9198; Restart</button>
      <button class="ctrl-btn ctrl-secondary" id="reset-btn">&#128257; New Video</button>
      <div class="speed-control">
        <span>Speed</span>
        <input type="range" id="speed-range" min="0.25" max="3" step="0.25" value="1" />
        <span id="speed-label">1x</span>
      </div>
    </div>
  </div>

</div>

<video id="hidden-video" style="display:none" muted playsinline></video>

<script>
  const uploadZone    = document.getElementById('upload-zone');
  const fileInput     = document.getElementById('file-input');
  const playerSection = document.getElementById('player-section');
  const canvas        = document.getElementById('canvas');
  const ctx           = canvas.getContext('2d');
  const playBtn       = document.getElementById('play-btn');
  const restartBtn    = document.getElementById('restart-btn');
  const resetBtn      = document.getElementById('reset-btn');
  const statusEl      = document.getElementById('status');
  const progressFill  = document.getElementById('progress-fill');
  const progressWrap  = document.getElementById('progress-wrap');
  const speedRange    = document.getElementById('speed-range');
  const speedLabel    = document.getElementById('speed-label');
  const hiddenVideo   = document.getElementById('hidden-video');

  let frames = [], fps = 24, frameIndex = 0;
  let playing = false, animFrame = null, lastTime = null, speed = 1;
  const msPerFrame = () => (1000 / fps) / speed;

  uploadZone.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') fileInput.click(); });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) loadVideo(file);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadVideo(fileInput.files[0]); });

  resetBtn.addEventListener('click', () => {
    stopPlayback(); frames = []; frameIndex = 0;
    playerSection.style.display = 'none';
    uploadZone.style.display = '';
    fileInput.value = '';
    progressFill.style.width = '0%';
  });

  speedRange.addEventListener('input', () => {
    speed = parseFloat(speedRange.value);
    speedLabel.textContent = speed + 'x';
  });

  playBtn.addEventListener('click', () => { if (playing) pausePlayback(); else startPlayback(); });
  restartBtn.addEventListener('click', () => { frameIndex = 0; drawFrame(0); updateProgress(); if (playing) lastTime = null; });
  progressWrap.addEventListener('click', e => {
    if (!frames.length) return;
    const rect = progressWrap.getBoundingClientRect();
    frameIndex = Math.floor(Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * (frames.length - 1));
    drawFrame(frameIndex); updateProgress();
  });

  function loadVideo(file) {
    uploadZone.style.display = 'none';
    playerSection.style.display = 'flex';
    playBtn.disabled = true; restartBtn.disabled = true;
    statusEl.textContent = 'Loading video…';
    frames = []; frameIndex = 0; progressFill.style.width = '0%';
    hiddenVideo.src = URL.createObjectURL(file);
    hiddenVideo.load();
    hiddenVideo.addEventListener('loadedmetadata', captureFrames, { once: true });
  }

  async function captureFrames() {
    const video = hiddenVideo;
    fps = 24;
    const total = Math.floor(video.duration * fps);
    const dpr = window.devicePixelRatio || 1;
    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;
    canvas.width = vw * dpr;
    canvas.height = vh * dpr;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    ctx.scale(dpr, dpr);
    statusEl.textContent = 'Capturing ' + total + ' frames… 0%';
    for (let i = 0; i < total; i++) {
      await seekTo(video, i / fps);
      ctx.drawImage(video, 0, 0, vw, vh);
      frames.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (i % 8 === 0 || i === total - 1) {
        const pct = Math.round(((i + 1) / total) * 100);
        statusEl.textContent = 'Capturing frames… ' + pct + '%';
        progressFill.style.width = pct + '%';
        await new Promise(r => setTimeout(r, 0));
      }
    }
    frames.reverse();
    frameIndex = 0; drawFrame(0);
    progressFill.style.width = '0%';
    statusEl.textContent = frames.length + ' frames ready — hit Play!';
    playBtn.disabled = false; restartBtn.disabled = false;
    playBtn.textContent = '▶️ Play';
  }

  function seekTo(video, time) {
    return new Promise(resolve => {
      video.addEventListener('seeked', resolve, { once: true });
      video.currentTime = time;
    });
  }

  function drawFrame(i) { if (frames[i]) ctx.putImageData(frames[i], 0, 0); }
  function updateProgress() {
    progressFill.style.width = (frames.length > 1 ? (frameIndex / (frames.length - 1)) * 100 : 0) + '%';
  }

  function startPlayback() {
    if (frameIndex >= frames.length - 1) frameIndex = 0;
    playing = true; playBtn.textContent = '⏸ Pause'; lastTime = null;
    animFrame = requestAnimationFrame(renderLoop);
    statusEl.textContent = '⏪ Playing backwards…';
  }
  function pausePlayback() { playing = false; playBtn.textContent = '▶️ Play'; if (animFrame) cancelAnimationFrame(animFrame); }
  function stopPlayback() { playing = false; if (animFrame) cancelAnimationFrame(animFrame); playBtn.textContent = '▶️ Play'; }

  function renderLoop(timestamp) {
    if (!playing) return;
    if (!lastTime) lastTime = timestamp;
    if (timestamp - lastTime >= msPerFrame()) {
      drawFrame(frameIndex); updateProgress(); frameIndex++; lastTime = timestamp;
      if (frameIndex >= frames.length) {
        frameIndex = frames.length - 1; pausePlayback();
        statusEl.textContent = '✅ Done! Hit Play to watch again.'; return;
      }
    }
    animFrame = requestAnimationFrame(renderLoop);
  }
</script>
</body>
</html>
